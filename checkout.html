<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — XTC Clothing</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: var(--bg); color: var(--text-primary); }

    .co-wrap {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 420px;
    }

    /* ── Left: form ── */
    .co-form-col {
      padding: 80px 64px 80px 80px;
      border-right: 1px solid var(--border);
    }
    .co-logo {
      display: inline-block;
      margin-bottom: 48px;
    }
    .co-logo img { height: 26px; width: auto; opacity: 0.85; }
    .co-logo-text { font-size: 18px; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; color: #fff; }

    .co-step-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .co-section-title {
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .co-fieldset {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .co-fieldset--full { grid-template-columns: 1fr; }
    .co-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .co-field--span2 { grid-column: span 2; }
    .co-field label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    .co-field input, .co-field select {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    .co-field input:focus, .co-field select:focus { border-color: var(--accent); }
    .co-field input::placeholder { color: rgba(255,255,255,0.2); }

    /* Stripe Payment Element container */
    #payment-element {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }

    #payment-errors {
      font-size: 12px;
      color: #e05;
      margin-top: 8px;
      min-height: 18px;
    }

    /* Express checkout (Apple Pay / Google Pay) */
    #expressCheckoutWrap { margin-bottom: 20px; }
    .co-or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 4px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .co-or-divider::before, .co-or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .co-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }

    .co-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: opacity 0.2s;
      border-radius: 2px;
      margin-top: 8px;
    }
    .co-submit:hover { opacity: 0.8; }
    .co-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .co-secure {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }
    .co-secure svg { opacity: 0.3; }

    /* ── Right: order summary ── */
    .co-summary-col {
      background: rgba(255,255,255,0.02);
      padding: 80px 48px 80px 48px;
    }
    .co-summary-title {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 32px;
    }
    .co-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      align-items: center;
    }
    .co-item__img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .co-item__img-placeholder {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .co-item__info { flex: 1; }
    .co-item__name {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .co-item__meta {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }
    .co-item__price {
      font-size: 13px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .co-totals {
      border-top: 1px solid var(--border);
      margin-top: 24px;
      padding-top: 24px;
    }
    .co-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .co-total-row--grand {
      font-size: 16px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 1px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .co-total-row--discount { color: rgba(34,197,94,0.9); }

    /* Promo code input */
    .co-promo {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .co-promo input {
      flex: 1;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: border-color 0.2s;
    }
    .co-promo input:focus { border-color: var(--accent); }
    .co-promo input::placeholder { text-transform: none; letter-spacing: 0; color: rgba(255,255,255,0.2); }
    .co-promo button {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 11px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .co-promo button:hover { border-color: var(--accent); color: #fff; }
    .co-promo-msg {
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      margin-top: -16px;
      min-height: 16px;
    }
    .co-promo-msg--ok  { color: rgba(34,197,94,0.9); }
    .co-promo-msg--err { color: rgba(220,38,38,0.9); }

    /* ── Success screen ── */
    .co-success {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 80px 32px;
      gap: 24px;
    }
    .co-success__icon {
      width: 64px;
      height: 64px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }
    .co-success__title {
      font-size: clamp(24px, 4vw, 40px);
      font-weight: 200;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .co-success__sub {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      max-width: 400px;
      line-height: 1.8;
    }

    @media (max-width: 900px) {
      .co-wrap { grid-template-columns: 1fr; }
      .co-summary-col { order: -1; padding: 40px 24px; }
      .co-form-col { padding: 40px 24px; border-right: none; }
      .co-fieldset { grid-template-columns: 1fr; }
      .co-field--span2 { grid-column: span 1; }
    }
  </style>
</head>
<body>

<div class="co-success" id="successScreen">
  <div class="co-success__icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <p class="co-step-label">Order Confirmed</p>
  <h1 class="co-success__title">Thank You</h1>
  <p class="co-success__sub">Your order has been placed. You'll receive a confirmation email shortly.</p>
  <a href="/" class="btn btn--primary" style="margin-top:8px;">Continue Shopping</a>
</div>

<div class="co-wrap" id="checkoutWrap">

  <!-- Form -->
  <div class="co-form-col">
    <a href="/cart" class="co-logo">
      <img src="https://cdn.shopify.com/s/files/1/0968/4471/0227/files/whitelogo.png"
           alt="XTC Clothing"
           onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
      <span class="co-logo-text" style="display:none">XTC</span>
    </a>

    <form id="checkoutForm">
      <p class="co-step-label">Step 1 of 2</p>
      <h2 class="co-section-title">Contact & Delivery</h2>

      <div class="co-fieldset">
        <div class="co-field">
          <label for="coEmail">Email</label>
          <input type="email" id="coEmail" placeholder="your@email.com" required />
        </div>
        <div class="co-field">
          <label for="coPhone">Phone (optional)</label>
          <input type="tel" id="coPhone" placeholder="+44 7700 900000" />
        </div>
        <div class="co-field">
          <label for="coFirstName">First Name</label>
          <input type="text" id="coFirstName" placeholder="James" required />
        </div>
        <div class="co-field">
          <label for="coLastName">Last Name</label>
          <input type="text" id="coLastName" placeholder="Byrne" required />
        </div>
        <div class="co-field co-field--span2">
          <label for="coAddress">Address</label>
          <input type="text" id="coAddress" placeholder="123 Main Street" required />
        </div>
        <div class="co-field">
          <label for="coCity">City</label>
          <input type="text" id="coCity" placeholder="London" required />
        </div>
        <div class="co-field">
          <label for="coPostcode">Postcode</label>
          <input type="text" id="coPostcode" placeholder="EC1A 1BB" required />
        </div>
      </div>

      <hr class="co-divider" />

      <p class="co-step-label">Step 2 of 2</p>
      <h2 class="co-section-title">Payment</h2>

      <!-- Apple Pay / Google Pay -->
      <div id="expressCheckoutWrap" style="display:none;">
        <div id="express-checkout-element"></div>
        <div class="co-or-divider"><span>or pay by card</span></div>
      </div>

      <div class="co-field" style="margin-bottom:8px;">
        <label>Payment</label>
        <div id="payment-element"></div>
        <div id="payment-errors"></div>
      </div>

      <button type="submit" class="co-submit" id="submitBtn">
        Place Order
      </button>

      <p class="co-secure">
        <svg width="12" height="14" viewBox="0 0 12 14" fill="currentColor">
          <path d="M6 0L0 3v4c0 3.5 2.5 6.5 6 7.5C9.5 13.5 12 10.5 12 7V3L6 0zm0 6.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
        </svg>
        Secured by Stripe
      </p>
    </form>
  </div>

  <!-- Summary -->
  <div class="co-summary-col">
    <p class="co-summary-title">Order Summary</p>
    <div id="coItems"></div>

    <!-- Promo code -->
    <div class="co-promo">
      <input type="text" id="promoInput" placeholder="Discount code" maxlength="20" />
      <button type="button" id="promoBtn" onclick="applyPromo()">Apply</button>
    </div>
    <p class="co-promo-msg" id="promoMsg"></p>

    <div class="co-totals">
      <div class="co-total-row">
        <span>Subtotal</span>
        <span id="coSubtotal">—</span>
      </div>
      <div class="co-total-row co-total-row--discount" id="coDiscountRow" style="display:none;">
        <span id="coDiscountLabel">Discount</span>
        <span id="coDiscountAmount">—</span>
      </div>
      <div class="co-total-row">
        <span>Shipping</span>
        <span id="coShipping">—</span>
      </div>
      <div class="co-total-row co-total-row--grand">
        <span>Total</span>
        <span id="coTotal">—</span>
      </div>
    </div>
  </div>

</div>

<script src="js/stock.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<script src="js/main.js"></script>
<script src="js/omnisend-config.js"></script>
<script>
(function(){
  var id = localStorage.getItem('xtc-ga4-id');
  if(id){ var s=document.createElement('script'); s.async=true; s.src='https://www.googletagmanager.com/gtag/js?id='+id; document.head.appendChild(s); window.dataLayer=window.dataLayer||[]; window.gtag=function(){dataLayer.push(arguments);}; gtag('js',new Date()); gtag('config',id); }
})();
</script>
<script src="js/analytics.js"></script>
<script>
(function() {
  const PUBLISHABLE_KEY = 'pk_test_51Tj2geQ7OLAqpBCHghSLYpQzTKxgaVKgMxuQQOImvEJ0X5891YwPXyabegt7w1wrEv9sRBYi9UNC3SeXkZ8cmAgD0006MRr2ZK';

  const APPEARANCE = {
    theme: 'night',
    variables: {
      colorPrimary: 'rgb(179,102,255)',
      colorBackground: '#111111',
      colorText: '#ffffff',
      colorDanger: '#ee0055',
      fontFamily: '"Helvetica Neue", Helvetica, Arial, sans-serif',
      borderRadius: '2px',
    }
  };

  // Active promo state
  let _promo = null; // { type, value, description, code }

  function getCartSubtotal() {
    const cart = JSON.parse(localStorage.getItem('xtc-cart') || '[]');
    return cart.reduce((s, i) => s + parseFloat((i.price||'0').replace(/[^0-9.]/g,'')) * i.qty, 0);
  }

  function renderSummary() {
    const cart = JSON.parse(localStorage.getItem('xtc-cart') || '[]');
    if (!cart.length) { window.location.href = '/cart'; return; }
    const itemsEl = document.getElementById('coItems');
    let subtotal = 0;
    itemsEl.innerHTML = cart.map(item => {
      const price = parseFloat(item.price.replace(/[^0-9.]/g, ''));
      subtotal += price * item.qty;
      const img = item.img
        ? `<img class="co-item__img" src="${item.img}" alt="${item.name}" onerror="this.style.display='none'" />`
        : `<div class="co-item__img-placeholder"></div>`;
      return `<div class="co-item">${img}<div class="co-item__info"><p class="co-item__name">${item.name}</p><p class="co-item__meta">Qty ${item.qty}</p></div><p class="co-item__price">£${(price * item.qty).toFixed(2)}</p></div>`;
    }).join('');
    updateTotals(subtotal);
  }

  function updateTotals(subtotal) {
    if (subtotal === undefined) subtotal = getCartSubtotal();
    const shipping = subtotal >= 80 ? 0 : 4.99;

    // Calculate discount
    let discountAmount = 0;
    if (_promo) {
      if (_promo.type === 'percent') {
        discountAmount = subtotal * (_promo.value / 100);
      } else if (_promo.type === 'fixed') {
        discountAmount = Math.min(_promo.value / 100, subtotal);
      }
    }

    const afterDiscount = subtotal - discountAmount;
    const total = afterDiscount + shipping;

    document.getElementById('coSubtotal').textContent = '£' + subtotal.toFixed(2);
    document.getElementById('coShipping').textContent = shipping === 0 ? 'Free' : '£4.99';
    document.getElementById('coTotal').textContent = '£' + total.toFixed(2);

    const discountRow = document.getElementById('coDiscountRow');
    if (_promo && discountAmount > 0) {
      discountRow.style.display = 'flex';
      document.getElementById('coDiscountLabel').textContent = _promo.description + ' (' + _promo.code + ')';
      document.getElementById('coDiscountAmount').textContent = '−£' + discountAmount.toFixed(2);
    } else {
      discountRow.style.display = 'none';
    }
  }

  window.applyPromo = async function() {
    const code = document.getElementById('promoInput').value.trim();
    const msgEl = document.getElementById('promoMsg');
    const btn = document.getElementById('promoBtn');
    if (!code) { msgEl.textContent = 'Enter a discount code.'; msgEl.className = 'co-promo-msg co-promo-msg--err'; return; }

    btn.disabled = true;
    btn.textContent = '...';
    msgEl.textContent = '';

    try {
      const res = await fetch('/validate-promo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code }),
      });
      const data = await res.json();
      if (!res.ok || !data.valid) {
        _promo = null;
        msgEl.textContent = data.error || 'Invalid code.';
        msgEl.className = 'co-promo-msg co-promo-msg--err';
      } else {
        _promo = { ...data, code: code.toUpperCase() };
        msgEl.textContent = '✓ ' + data.description + ' applied!';
        msgEl.className = 'co-promo-msg co-promo-msg--ok';
        document.getElementById('promoInput').disabled = true;
        btn.textContent = 'Remove';
        btn.onclick = removePromo;
        updateTotals();
        // Reinitialise payment intent with new discounted amount
        await reinitPayment();
      }
    } catch {
      msgEl.textContent = 'Could not validate code. Try again.';
      msgEl.className = 'co-promo-msg co-promo-msg--err';
    }
    btn.disabled = false;
    if (!_promo) btn.textContent = 'Apply';
  };

  window.removePromo = function() {
    _promo = null;
    const msgEl = document.getElementById('promoMsg');
    msgEl.textContent = '';
    const input = document.getElementById('promoInput');
    input.value = '';
    input.disabled = false;
    const btn = document.getElementById('promoBtn');
    btn.textContent = 'Apply';
    btn.onclick = applyPromo;
    updateTotals();
    reinitPayment();
  };

  function completeOrder(emailOverride) {
    const cart = JSON.parse(localStorage.getItem('xtc-cart') || '[]');
    const orders = JSON.parse(localStorage.getItem('xtc-orders') || '{}');
    const orderId = 'XTC' + Date.now().toString().slice(-6);
    const email = emailOverride || document.getElementById('coEmail').value || '';
    orders[orderId] = { id: orderId, number: orderId, email, items: cart, date: new Date().toISOString(), status: 'Processing' };
    localStorage.setItem('xtc-orders', JSON.stringify(orders));
    if (typeof decrementStock === 'function') {
      cart.forEach(item => {
        const parts = item.id.split('-');
        decrementStock(parts.slice(0, -1).join('-'), parts[parts.length - 1].toUpperCase(), item.qty);
      });
    }
    localStorage.setItem('xtc-cart', '[]');
    const totalValue = cart.reduce((s, i) => s + parseFloat((i.price||'0').replace(/[^0-9.]/g,'')) * i.qty, 0);
    if (typeof xtcEvent === 'function') xtcEvent('purchase', { transaction_id: orderId, value: totalValue, currency: 'GBP' });
    if (typeof omnisendSubscribe === 'function') omnisendSubscribe(email, 'checkout');
    if (typeof omnisendTrackPurchase === 'function') omnisendTrackPurchase(orderId, email, cart, totalValue);
    setTimeout(() => { window.location.href = '/order-confirmed?id=' + orderId; }, 400);
  }

  const stripe = Stripe(PUBLISHABLE_KEY);
  let _elements = null;
  let _formListenerAttached = false;

  function calcTotalPence() {
    const subtotal = getCartSubtotal();
    const shipping = subtotal >= 80 ? 0 : 4.99;
    let discount = 0;
    if (_promo) {
      if (_promo.type === 'percent') discount = subtotal * (_promo.value / 100);
      else if (_promo.type === 'fixed') discount = Math.min(_promo.value / 100, subtotal);
    }
    return Math.round((subtotal - discount + shipping) * 100);
  }

  async function mountStripeElements(clientSecret) {
    // Unmount existing if reinitialising
    if (_elements) {
      try { _elements.getElement('payment')?.unmount(); } catch {}
      try { _elements.getElement('expressCheckout')?.unmount(); } catch {}
    }
    document.getElementById('payment-element').innerHTML = '';
    document.getElementById('express-checkout-element').innerHTML = '';

    _elements = stripe.elements({ clientSecret, appearance: APPEARANCE });

    const expressCheckout = _elements.create('expressCheckout', {
      buttonType: { applePay: 'buy', googlePay: 'buy' },
      buttonTheme: { applePay: 'white', googlePay: 'white' },
    });
    expressCheckout.mount('#express-checkout-element');
    expressCheckout.on('ready', ({ availablePaymentMethods }) => {
      if (availablePaymentMethods && Object.values(availablePaymentMethods).some(Boolean)) {
        document.getElementById('expressCheckoutWrap').style.display = 'block';
      }
    });
    expressCheckout.on('confirm', async (event) => {
      const email = event.billingDetails?.email || document.getElementById('coEmail').value || '';
      const { error } = await stripe.confirmPayment({
        elements: _elements,
        confirmParams: { return_url: window.location.origin + '/checkout' },
        redirect: 'if_required',
      });
      if (error) {
        document.getElementById('payment-errors').textContent = error.message;
      } else {
        completeOrder(email);
      }
    });

    const paymentElement = _elements.create('payment', {
      fields: { billingDetails: { phone: 'auto' } },
      layout: 'tabs',
    });
    paymentElement.mount('#payment-element');

    if (!_formListenerAttached) {
      _formListenerAttached = true;
      document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Processing…';
        document.getElementById('payment-errors').textContent = '';

        const { error } = await stripe.confirmPayment({
          elements: _elements,
          confirmParams: {
            return_url: window.location.origin + '/checkout',
            payment_method_data: {
              billing_details: {
                name: document.getElementById('coFirstName').value + ' ' + document.getElementById('coLastName').value,
                email: document.getElementById('coEmail').value,
                phone: '',
                address: {
                  line1: document.getElementById('coAddress').value,
                  city: document.getElementById('coCity').value,
                  postal_code: document.getElementById('coPostcode').value,
                  country: 'GB',
                },
              },
            },
          },
          redirect: 'if_required',
        });

        if (error) {
          document.getElementById('payment-errors').textContent = error.message;
          btn.disabled = false;
          btn.textContent = 'Place Order';
        } else {
          completeOrder();
        }
      });
    }
  }

  async function createPaymentIntent() {
    const totalPence = calcTotalPence();
    const res = await fetch('/create-payment-intent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ amount: totalPence, promoCode: _promo ? _promo.code : null }),
    });
    if (!res.ok) throw new Error('Failed to create payment intent');
    return (await res.json()).clientSecret;
  }

  async function reinitPayment() {
    try {
      const clientSecret = await createPaymentIntent();
      await mountStripeElements(clientSecret);
    } catch {
      document.getElementById('payment-errors').textContent = 'Failed to update payment. Please refresh.';
    }
  }

  async function init() {
    // Handle 3DS redirect return
    const urlParams = new URLSearchParams(window.location.search);
    const piSecret = urlParams.get('payment_intent_client_secret');
    if (piSecret) {
      const { paymentIntent } = await stripe.retrievePaymentIntent(piSecret);
      if (paymentIntent && paymentIntent.status === 'succeeded') {
        completeOrder();
      } else {
        document.getElementById('payment-errors').textContent = 'Payment could not be completed. Please try again.';
        document.getElementById('checkoutWrap').style.display = 'grid';
      }
      return;
    }

    renderSummary();

    const cart = JSON.parse(localStorage.getItem('xtc-cart') || '[]');
    if (!cart.length) return;

    if (typeof xtcEvent === 'function') xtcEvent('begin_checkout', { currency: 'GBP', value: getCartSubtotal() });

    try {
      const clientSecret = await createPaymentIntent();
      await mountStripeElements(clientSecret);
    } catch {
      document.getElementById('payment-errors').textContent = 'Failed to initialise payment. Please refresh.';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
