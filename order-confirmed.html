<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="facebook-domain-verification" content="esutabuvcdyy9dbvh58ecv5ipn3e43" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — XTC Clothing</title>
  <meta name="description" content="Your XTC Clothing order is confirmed. Thank you for your purchase." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #0a0a0a; }

    .oc-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 80px;
    }

    /* ── Shareable card ── */
    .oc-card {
      width: 100%;
      max-width: 420px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.07);
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .oc-logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      margin-bottom: 28px;
      text-transform: uppercase;
    }
    .oc-logo span { color: #b366ff; }

    .oc-icon {
      width: 56px;
      height: 56px;
      margin-bottom: 20px;
    }

    .oc-title {
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 6px;
    }

    .oc-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .oc-order-id {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(179,102,255,0.7);
      margin-bottom: 28px;
    }

    /* ── Items ── */
    .oc-items {
      width: 100%;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding-top: 20px;
      margin-bottom: 20px;
    }

    .oc-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-align: left;
    }
    .oc-item:last-child { border-bottom: none; }

    .oc-item-img {
      width: 52px;
      height: 52px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .oc-item-info { flex: 1; min-width: 0; }
    .oc-item-name {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 3px;
    }
    .oc-item-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
    }
    .oc-item-price {
      font-size: 13px;
      color: #b366ff;
      font-weight: 600;
      flex-shrink: 0;
    }

    .oc-total-row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .oc-total-row span:last-child { color: #b366ff; font-weight: 700; }

    .oc-date {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.2);
      margin-top: 18px;
      text-transform: uppercase;
    }

    /* ── Buttons (outside card, not in screenshot) ── */
    .oc-actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 420px;
    }

    .oc-btn-save {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .oc-btn-save:hover { opacity: 0.88; }
    .oc-btn-save:active { opacity: 0.72; }

    @property --win-a {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes win-circuit-run {
      to { --win-a: 360deg; }
    }

    .oc-win-note {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.7;
      padding: 12px 16px;
      background: rgba(179,102,255,0.07);
      width: 100%;
      box-sizing: border-box;
      position: relative;
      border: 1px solid rgba(179,102,255,0.15);
    }
    .oc-win-note::before,
    .oc-win-note::after {
      content: '';
      position: absolute;
      inset: 0;
      padding: 1px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .oc-win-note::before {
      --win-a: 0deg;
      animation: win-circuit-run 3.5s linear infinite;
      background: conic-gradient(from var(--win-a),
        transparent 0%, transparent 60%,
        rgba(100,30,200,0.6) 72%, rgba(179,102,255,1) 80%, rgba(220,170,255,1) 85%,
        rgba(179,102,255,0.8) 92%, transparent 100%
      );
    }
    .oc-win-note::after {
      --win-a: 0deg;
      animation: win-circuit-run 0.8s linear infinite;
      background: conic-gradient(from var(--win-a),
        transparent 0%, transparent 50%,
        rgba(100,30,200,0.7) 65%, rgba(179,102,255,1) 75%, rgba(230,190,255,1) 82%,
        rgba(179,102,255,0.8) 90%, transparent 100%
      );
      opacity: 0;
    }
    .oc-win-note strong {
      display: block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #b366ff;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .oc-btn-shop {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 13px 20px;
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .oc-btn-shop:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

    .oc-saving-msg {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <main class="oc-wrap">

    <!-- Shareable card — this gets screenshotted -->
    <div class="oc-card" id="ocCard">
      <svg class="oc-icon" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="24" stroke="rgba(179,102,255,0.4)" stroke-width="1.5"/>
        <path d="M15 26l8 8 14-14" stroke="#b366ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <p class="oc-title">Order Confirmed</p>
      <p class="oc-sub">Thank you. Your order is being processed.</p>
      <p class="oc-order-id" id="ocOrderId"></p>

      <div class="oc-items" id="ocItems"></div>

      <div class="oc-total-row">
        <span>Total</span>
        <span id="ocTotal">—</span>
      </div>

      <p class="oc-date" id="ocDate"></p>
    </div>

    <!-- Actions — outside the card so they don't appear in screenshot -->
    <div class="oc-actions" id="ocActions">
      <!-- Win CTA — above the Instagram button -->
      <p class="oc-win-note" id="winNote" style="box-sizing:border-box;"><strong>@xtc.rip</strong>Tag us for a chance to win a free t&#8209;shirt</p>
      <button class="oc-btn-save" id="saveBtn" onclick="shareToInstagram()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        Share to Instagram Story
      </button>
      <p class="oc-saving-msg" id="savingMsg">Generating image…</p>
      <a href="/" class="oc-btn-shop">Continue Shopping</a>
    </div>

  </main>

  <!-- html2canvas for screenshot -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    let orderId = params.get('id') || ('XTC' + Date.now().toString().slice(-6));
    let _orderValue = 0;

    // Fire the Meta Pixel Purchase conversion exactly once per order.
    function fireMetaPurchase(id, value) {
      try {
        if (!window.fbq) return;
        const k = 'xtc-fb-purchased-' + id;
        if (sessionStorage.getItem(k)) return;
        sessionStorage.setItem(k, '1');
        // eventID matches the server-side Conversions API event so Meta dedupes them.
        fbq('track', 'Purchase', { value: Number(value) || 0, currency: 'GBP' }, { eventID: id });
      } catch (e) {}
    }

    // Product images map
    const PRODUCT_IMAGES = {
      'polo-black': 'images/polo-black-flat.jpg',
      'polo-white': 'images/polo-white-flat.jpg',
      'war-zip': 'images/ZIP-HOODIE-XTC.jpg',
      'war-joggers': 'images/JOGGERS-XTC.jpg',
      'uniform-t': 'images/T-SHIRT-XTC.jpg',
    };

    // Resolve a preview image from either a product id ('war-zip-l') or a
    // display name ('WAR™ ZIP — L'). Order matters: match the distinctive
    // SS26 keywords before the generic black/white polos.
    function getProductImage(text) {
      const t = (text || '').toLowerCase();
      if (t.includes('zip')) return PRODUCT_IMAGES['war-zip'];
      if (t.includes('jogger')) return PRODUCT_IMAGES['war-joggers'];
      if (t.includes('uniform')) return PRODUCT_IMAGES['uniform-t'];
      if (t.includes('white')) return PRODUCT_IMAGES['polo-white'];
      if (t.includes('black')) return PRODUCT_IMAGES['polo-black'];
      return null;
    }

    // Build a single order-item row — shared by the server + localStorage paths
    function buildItemRow(img, name, meta, priceText) {
      const imgHtml = img
        ? `<img class="oc-item-img" src="${img}" alt="${name}" crossorigin="anonymous" />`
        : `<div class="oc-item-img" style="display:flex;align-items:center;justify-content:center;font-size:18px;">👕</div>`;
      return `<div class="oc-item">
        ${imgHtml}
        <div class="oc-item-info">
          <div class="oc-item-name">${name}</div>
          <div class="oc-item-meta">${meta}</div>
        </div>
        <div class="oc-item-price">${priceText}</div>
      </div>`;
    }

    function showEmpty() {
      document.getElementById('ocItems').innerHTML = '<p style="font-size:12px;color:rgba(255,255,255,0.3);text-align:center;padding:8px 0;">Your order details</p>';
      document.getElementById('ocTotal').textContent = '—';
    }

    // Verified order from Stripe (via ?session_id) — the source of truth
    async function renderFromServer(sid) {
      const res = await fetch('/order/' + encodeURIComponent(sid));
      if (!res.ok) throw new Error('Order lookup failed (' + res.status + ')');
      const data = await res.json();
      if (data.ref) orderId = data.ref;

      const items = data.items || [];
      if (!items.length) { showEmpty(); return; }

      document.getElementById('ocItems').innerHTML = items.map(li => {
        const parts = (li.name || '').split('—');
        const name = (parts[0] || 'XTC Polo').trim();
        const size = parts[1] ? parts[1].trim() : '';
        const meta = (size ? 'Size: ' + size + ' &nbsp;·&nbsp; ' : '') + 'Qty: ' + (li.qty || 1);
        return buildItemRow(getProductImage(li.name), name, meta, '£' + (li.amount / 100).toFixed(2));
      }).join('');

      _orderValue = (data.total || 0) / 100;
      document.getElementById('ocTotal').textContent = '£' + (data.total / 100).toFixed(2);
    }

    // Fallback: render from the browser cart (custom checkout, or if lookup fails)
    function renderFromLocal() {
      const cart = JSON.parse(localStorage.getItem('xtc-last-order') || localStorage.getItem('xtc-cart') || '[]');
      if (!cart.length) { showEmpty(); return; }

      let total = 0;
      document.getElementById('ocItems').innerHTML = cart.map(item => {
        const price = parseFloat((item.price || '0').replace(/[^0-9.]/g, ''));
        const lineTotal = price * (item.qty || 1);
        total += lineTotal;
        const meta = 'Size: ' + (item.size || '—') + ' &nbsp;·&nbsp; Qty: ' + (item.qty || 1);
        return buildItemRow(getProductImage(item.id || item.name), item.name || 'XTC Polo', meta, '£' + lineTotal.toFixed(2));
      }).join('');

      _orderValue = total;
      document.getElementById('ocTotal').textContent = '£' + total.toFixed(2);
    }

    async function renderOrder() {
      document.getElementById('ocDate').textContent = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

      if (sessionId) {
        try {
          await renderFromServer(sessionId);
          document.getElementById('ocOrderId').textContent = 'Order ' + orderId;
          fireMetaPurchase(orderId, _orderValue);
          return;
        } catch (e) {
          // Lookup failed (e.g. lost session) — fall back to local cart
        }
      }

      renderFromLocal();
      document.getElementById('ocOrderId').textContent = 'Order ' + orderId;
      fireMetaPurchase(orderId, _orderValue);
    }

    const IGBtnHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg> Share to Instagram Story';

    async function shareToInstagram() {
      const btn = document.getElementById('saveBtn');
      const msg = document.getElementById('savingMsg');
      const actions = document.getElementById('ocActions');

      btn.disabled = true;
      btn.textContent = 'Generating…';
      msg.style.display = 'block';
      actions.style.display = 'none';

      try {
        const card = document.getElementById('ocCard');
        const canvas = await html2canvas(card, {
          backgroundColor: '#111111',
          scale: 3,
          useCORS: true,
          allowTaint: false,
          logging: false,
        });

        actions.style.display = 'flex';

        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'xtc-order.png', { type: 'image/png' });
          const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

          if (isMobile) {
            // Step 1: save image to camera roll via share API (silent — no UI if possible)
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
              try { await navigator.share({ files: [file], title: 'XTC Order' }); } catch(e) { /* user cancelled or shared */ }
            } else {
              downloadCanvas(canvas);
            }
            // Step 2: deep-link straight into Instagram Stories camera
            // instagram://story-camera opens the Stories camera; image is ready in the recents strip
            setTimeout(() => {
              window.location.href = 'instagram://story-camera';
              // Fallback: if app not installed, open instagram.com after a tick
              setTimeout(() => {
                if (document.visibilityState !== 'hidden') {
                  window.open('https://www.instagram.com/', '_blank');
                }
              }, 1500);
            }, 400);
          } else {
            // Desktop: download image + open Instagram web
            downloadCanvas(canvas);
            setTimeout(() => window.open('https://www.instagram.com/', '_blank'), 600);
          }

          btn.disabled = false;
          btn.innerHTML = IGBtnHTML;
          msg.style.display = 'none';
        }, 'image/png');
      } catch(e) {
        actions.style.display = 'flex';
        winNote.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = IGBtnHTML;
        msg.style.display = 'none';
        alert('Could not generate image. Try screenshotting the card manually.');
      }
    }

    function downloadCanvas(canvas) {
      const link = document.createElement('a');
      link.download = 'xtc-order-' + orderId + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    renderOrder();
    // Save cart as last order before it might get cleared
    const cartNow = localStorage.getItem('xtc-cart');
    if (cartNow && JSON.parse(cartNow).length) {
      localStorage.setItem('xtc-last-order', cartNow);
    }
  </script>
</body>
</html>
